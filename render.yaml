services:
  - type: web
    name: vahan-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server-dist/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
